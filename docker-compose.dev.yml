services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm install && npm run migrate && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://buildingco:buildingco@db:5432/building_company
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: building_company
      POSTGRES_USER: buildingco
      POSTGRES_PASSWORD: buildingco
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildingco -d building_company"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata_dev:
