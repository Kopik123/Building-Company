# Building Company – Nginx reverse-proxy configuration
#
# The setup script (deploy/setup-droplet.sh) replaces '/var/www/building-company'
# with the actual APP_DIR automatically.  If you copy this file manually, replace
# all occurrences of '/var/www/building-company' with your actual app path.

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

upstream building_company {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Certbot will insert HTTPS redirect here automatically when you run certbot --nginx

    # Maximum upload size (must match multer limit in the app)
    client_max_body_size 25M;

    # ── Static: uploaded files ────────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/building-company/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Static: gallery images ────────────────────────────────────────────────
    location /Gallery/ {
        alias /var/www/building-company/Gallery/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Static: CSS / JS / HTML ───────────────────────────────────────────────
    location ~* \.(css|js|ico|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp)$ {
        root /var/www/building-company;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri @node;
    }

    # ── Everything else → Node.js ─────────────────────────────────────────────
    location / {
        proxy_pass http://building_company;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location @node {
        proxy_pass http://building_company;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
