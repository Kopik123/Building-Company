services:
  postgres:
    image: postgres:16-alpine
    container_name: building-company-local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: building_company_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - building_company_local_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d building_company_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  building_company_local_db:
