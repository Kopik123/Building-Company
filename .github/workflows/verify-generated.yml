name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run generated pages + API v2 gate
        run: npm run test:ci
