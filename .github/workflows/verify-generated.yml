name: Verify Generated Pages

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify-generated:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated public pages
        run: npm run verify:generated
